name: Android Build and Release

on:
  push:
    branches:
      - main
      - github_pipeline
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore Library.sln

      - name: Verify project structure
        run: |
          if (-not (Test-Path "Library.csproj")) {
            Write-Error "Library.csproj not found"
            exit 1
          }
          if (-not (Test-Path "Library.Core\Library.Core.csproj")) {
            Write-Error "Library.Core.csproj not found"
            exit 1
          }

      - name: Decode Keystore
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}/library.keystore", $bytes)
          
          # Verify keystore was created successfully
          if (-not (Test-Path "${{ github.workspace }}/library.keystore")) {
            Write-Error "Failed to create keystore file"
            exit 1
          }

      - name: Build Android App (Debug)
        if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        run: |
          dotnet build Library.csproj -c Debug -f net10.0-android /p:AndroidPackageFormats=apk
          # Verify APK was created
          $apkFiles = Get-ChildItem -Path "bin\Debug\net10.0-android" -Filter "*.apk" -Recurse
          if ($apkFiles.Count -eq 0) {
            Write-Error "No APK files found after build"
            exit 1
          }

      - name: Create appsettings.Release.json
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          $json = @{
            YandexOAuthClientId = "${{ secrets.YANDEX_OAUTH_CLIENT_ID }}"
          } | ConvertTo-Json -Depth 10
          Set-Content -Path "appsettings.Release.json" -Value $json -NoNewline
          Write-Host "Created appsettings.Release.json with YandexOAuthClientId"

      - name: Build and Sign Android App (Release)
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        env:
          AndroidKeyPass: ${{ secrets.ANDROID_KEY_PASSWORD }}
          AndroidStorePass: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |          
          # Verify keystore exists (relative path as in .csproj)
          $keystorePath = "library.keystore"
          if (-not (Test-Path $keystorePath)) {
            Write-Error "Keystore file not found at: $keystorePath"
            Write-Host "Current directory: $(Get-Location)"
            Write-Host "Files in current directory:"
            Get-ChildItem | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          Write-Host "Keystore found at: $((Get-Item $keystorePath).FullName)"
          
          Write-Host "Starting dotnet publish..."
          Write-Host "Current directory: $(Get-Location)"
          dotnet publish Library.csproj `
            -c Release `
            -f net10.0-android `
            /p:AndroidPackageFormats=apk `
            /verbosity:detailed
            
          Write-Host "Publish completed. Searching for APK files..."
          
          # List all files in the output directory for debugging
          $outputPath = "bin\Release\net10.0-android"
          if (Test-Path $outputPath) {
            Write-Host "Contents of ${outputPath}:"
            Get-ChildItem -Path $outputPath -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName)"
            }
          } else {
            Write-Host "Output path ${outputPath} does not exist"
          }
          
          # Check multiple possible locations for APK files
          $possiblePaths = @(
            "bin\Release\net10.0-android",
            "bin\Release\net10.0-android\publish",
            "bin\Release\net10.0-android\ru.rapaner.library"
          )
          
          $apkFiles = @()
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              Write-Host "Checking path: ${path}"
              $found = Get-ChildItem -Path $path -Filter "*.apk" -Recurse -ErrorAction SilentlyContinue
              if ($found) {
                $apkFiles += $found
                Write-Host "Found APK files in ${path}:"
                $found | ForEach-Object { Write-Host "  $($_.FullName)" }
              }
            }
          }
          
          # Also try searching from workspace root
          if ($apkFiles.Count -eq 0) {
            Write-Host "Searching from workspace root..."
            $apkFiles = Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.apk" -Recurse -ErrorAction SilentlyContinue
            if ($apkFiles) {
              Write-Host "Found APK files in workspace:"
              $apkFiles | ForEach-Object { Write-Host "  $($_.FullName)" }
            }
          }
          
          if ($apkFiles.Count -eq 0) {
            Write-Error "No APK files found after publish"
            Write-Host "Build output directory structure:"
            if (Test-Path "bin\Release") {
              Get-ChildItem -Path "bin\Release" -Recurse | Select-Object -First 50 | ForEach-Object {
                Write-Host "  $($_.FullName)"
              }
            }
            exit 1
          }
          
          Write-Host "Successfully found $($apkFiles.Count) APK file(s)"

      - name: Upload Debug APK
        if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.sha }}
          path: bin/Debug/net10.0-android/**/*.apk
          retention-days: 7

      - name: Upload Signed Release APK
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-signed-apk-${{ github.sha }}
          path: bin/Release/net10.0-android/**/*.apk
          retention-days: 90

      - name: List APK files before release
        if: github.ref_type == 'tag'
        run: |
          Write-Host "APK files found:"
          Get-ChildItem -Path "bin\Release\net10.0-android" -Filter "*.apk" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          
          # Verify specific APK files exist
          $apk1 = "bin\Release\net10.0-android\ru.rapaner.library.apk"
          $apk2 = "bin\Release\net10.0-android\ru.rapaner.library-Signed.apk"
          
          if (-not (Test-Path $apk1)) {
            Write-Error "APK file not found: $apk1"
            exit 1
          }
          if (-not (Test-Path $apk2)) {
            Write-Error "Signed APK file not found: $apk2"
            exit 1
          }
          
          Write-Host "All required APK files found successfully"

      - name: Copy APK with tag version
        if: github.ref_type == 'tag'
        run: |
          $sourceApk = "bin\Release\net10.0-android\ru.rapaner.library-Signed.apk"
          $destApk = "bin\Release\net10.0-android\ru.rapaner.library-${{ github.ref_name }}.apk"
          
          if (-not (Test-Path $sourceApk)) {
            Write-Error "Source APK file not found: $sourceApk"
            exit 1
          }
          
          Copy-Item $sourceApk $destApk
          Write-Host "Copied APK to: $destApk"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net10.0-android/ru.rapaner.library-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keystore
        if: always() && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
        run: |
          if (Test-Path "${{ github.workspace }}/library.keystore") {
            Remove-Item "${{ github.workspace }}/library.keystore" -Force
          }

